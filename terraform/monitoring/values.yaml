alertmanager:
  config:
    route:
      receiver: slack-notifications
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url: 
            channel: "#all-tradinggameslackalerts"
            title: " {{ .CommonAnnotations.summary }}"
            text: "{{ .CommonAnnotations.description }}"