version: '3.8'

services:

  backend:
    image: trading-server
    container_name: trading-backend
    ports:
      - "5050:5000"
    environment:
      - AWS_ACCESS_KEY_ID=XXXX
      - AWS_SECRET_ACCESS_KEY=YYYY
      - AWS_REGION=eu-west-2
      - AWS_BUCKET_NAME=tradinggame-capstone
      - PORT=5000
    restart: always

  frontend:
    image: trading-client
    container_name: trading-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always